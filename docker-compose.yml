services:
  db:
    image: postgres:15
    restart: unless-stopped
    environment:
      POSTGRES_DB: nutrilens
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: .
    restart: unless-stopped
    depends_on:
      - db
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-changeme}@db:5432/nutrilens
      SECRET_KEY: ${SECRET_KEY:-change-this-to-a-random-secret}
    volumes:
      - ./uploads:/app/uploads
      - ./model:/app/model

volumes:
  postgres_data:
